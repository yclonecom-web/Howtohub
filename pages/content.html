<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HowToHub — Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="container">
      <a href="../index.html" class="nav-logo">
        <div class="logo-icon">H</div>
        <span>HowToHub</span>
      </a>

      <div class="nav-search">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input type="text" placeholder="Search tutorials, manuals, users..." autocomplete="off">
        <div class="search-results"></div>
      </div>

      <div class="desktop-nav-links">
        <a href="../index.html" class="desktop-nav-link" data-page="home"><i data-lucide="home"></i> Home</a>
        <a href="bookmarks.html" class="desktop-nav-link" data-page="bookmarks"><i data-lucide="bookmark"></i> Saved</a>
        <a href="upload.html" class="desktop-nav-link" data-page="create"><i data-lucide="plus-circle"></i> Create</a>
        <a href="profile.html" class="desktop-nav-link" data-page="profile"><i data-lucide="user"></i> Profile</a>
        <a href="settings.html" class="desktop-nav-link" data-page="settings"><i data-lucide="settings"></i> Settings</a>
      </div>

      <div class="nav-actions">
        <button class="nav-btn hide-mobile" onclick="toggleTheme()" title="Toggle theme"><i data-lucide="moon"></i></button>
        <button class="nav-btn hide-mobile" title="Notifications"><i data-lucide="bell"></i><span class="badge"></span></button>
        <a href="profile.html" class="nav-avatar">YU</a>
      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../index.html" data-page="home">
      <span class="nav-icon"><i data-lucide="home"></i></span><span>Home</span>
    </a>
    <a href="bookmarks.html" data-page="bookmarks">
      <span class="nav-icon"><i data-lucide="bookmark"></i></span><span>Saved</span>
    </a>
    <a href="upload.html" data-page="create">
      <span class="nav-icon"><i data-lucide="plus-circle"></i></span><span>Create</span>
    </a>
    <a href="profile.html" data-page="profile">
      <span class="nav-icon"><i data-lucide="user"></i></span><span>Profile</span>
    </a>
    <a href="settings.html" data-page="settings">
      <span class="nav-icon"><i data-lucide="settings"></i></span><span>Settings</span>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="container page-content">
    <div class="content-view" id="contentView">
      <!-- Dynamic content loaded here -->
    </div>

    <!-- Similar Content -->
    <div class="recommended-section" id="similarSection" style="max-width: 800px; margin: 40px auto 0;">
      <h2><i data-lucide="lightbulb"></i> Similar Tutorials</h2>
      <div class="cards-grid" id="similarGrid"></div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/algorithm.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const contentId = parseInt(urlParams.get('id'));

    function renderContentView() {
      const content = state.getContentById(contentId);
      const view = document.getElementById('contentView');

      if (!content) {
        view.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i data-lucide="frown"></i></div>
            <h3>Content not found</h3>
            <p>This tutorial may have been removed or doesn't exist.</p>
            <br>
            <a href="../index.html" class="profile-btn profile-btn-primary">Back to Home</a>
          </div>
        `;
        return;
      }

      document.title = `${content.title} — HowToHub`;
      state.recordView(contentId);

      const isLiked = state.isLiked(contentId);
      const isSaved = state.isBookmarked(contentId);
      const isPinned = state.isPinned(contentId);
      const likeCount = content.likes + (isLiked ? 1 : 0);
      const viewCount = state.getViewCount(contentId);
      const comments = state.getComments(contentId);

      view.innerHTML = `
        <a href="../index.html" class="content-back"><i data-lucide="arrow-left"></i> Back to feed</a>

        <div class="content-hero">
          <div class="content-hero-placeholder" style="background: ${content.coverGradient}"><i data-lucide="${content.coverIcon}"></i></div>
        </div>

        <div class="card-tags" style="margin-bottom: 16px;">
          ${(content.tags || []).map(t => `<span class="tag ${getTagClass(t)}">${t}</span>`).join('')}
        </div>

        <h1 class="content-title">${content.title}</h1>

        <div class="content-meta">
          <div class="meta-author">
            <div class="meta-author-avatar">${content.author.initials}</div>
            <div class="meta-author-info">
              <div class="author-name">${content.author.name}</div>
              <div class="author-date">${timeAgo(content.date)} · ${formatNumber(viewCount)} views</div>
            </div>
          </div>
          <button class="follow-btn" onclick="handleFollow('${content.author.username}', this)" style="padding: 6px 20px; border-radius: 50px; font-size: 13px; font-weight: 600; background: var(--primary); color: #fff; transition: all var(--transition);">
            ${state.isFollowing(content.author.username) ? 'Following' : 'Follow'}
          </button>
        </div>

        <div class="content-actions-bar">
          <button class="content-action-btn ${isLiked ? 'liked' : ''}" onclick="handleContentLike(this)">
            <span><i data-lucide="heart"></i></span>
            <span class="like-count">${formatNumber(likeCount)}</span>
          </button>
          <button class="content-action-btn" onclick="document.getElementById('commentInput').focus()">
            <span><i data-lucide="message-circle"></i></span>
            <span>${comments.length} Comments</span>
          </button>
          <button class="content-action-btn ${isSaved ? 'saved' : ''}" onclick="handleContentSave(this)">
            <span><i data-lucide="bookmark"></i></span>
            <span>${isSaved ? 'Saved' : 'Save'}</span>
          </button>
          <button class="content-action-btn ${isPinned ? 'saved' : ''}" onclick="handleContentPin(this)">
            <span><i data-lucide="pin"></i></span>
            <span>${isPinned ? 'Pinned' : 'Pin'}</span>
          </button>
          <button class="content-action-btn" onclick="shareContent()">
            <span><i data-lucide="share-2"></i></span>
            <span>Share</span>
          </button>
        </div>

        <div class="content-body">
          ${content.body || '<p>Content coming soon...</p>'}
        </div>

        <div class="comments-section">
          <h2><i data-lucide="message-circle"></i> Comments (${comments.length})</h2>

          <div class="comment-input-wrapper">
            <div class="comment-avatar">${CURRENT_USER.initials}</div>
            <div class="comment-input-box">
              <textarea id="commentInput" placeholder="Write a comment..." rows="2"></textarea>
              <div class="comment-submit-row">
                <button class="comment-submit-btn" onclick="submitComment()">Post Comment</button>
              </div>
            </div>
          </div>

          <div id="commentsList">
            ${comments.map(c => renderComment(c)).join('')}
          </div>
        </div>
      `;
    }

    function renderComment(c) {
      return `
        <div class="comment-item">
          <div class="comment-avatar">${c.initials}</div>
          <div class="comment-content">
            <div class="comment-header">
              <span class="comment-author">${c.author}</span>
              <span class="comment-time">${c.time}</span>
            </div>
            <p class="comment-text">${c.text}</p>
            <div class="comment-actions">
              <button class="comment-action"><i data-lucide="heart"></i> Like</button>
              <button class="comment-action">Reply</button>
            </div>
          </div>
        </div>
      `;
    }

    function handleContentLike(btn) {
      const liked = state.toggleLike(contentId);
      const content = state.getContentById(contentId);
      const count = content.likes + (liked ? 1 : 0);

      btn.classList.toggle('liked', liked);
      btn.querySelector('span:first-child').innerHTML = '<i data-lucide="heart"></i>';
      refreshIcons();
      btn.querySelector('.like-count').textContent = formatNumber(count);

      showToast(liked ? 'Added to likes' : 'Removed from likes');
    }

    function handleContentSave(btn) {
      const saved = state.toggleBookmark(contentId);

      btn.classList.toggle('saved', saved);
      btn.querySelector('span:last-child').textContent = saved ? 'Saved' : 'Save';

      showToast(saved ? 'Saved to bookmarks' : 'Removed from bookmarks');
    }

    function handleContentPin(btn) {
      const pinned = state.togglePin(contentId);

      btn.classList.toggle('saved', pinned);
      btn.querySelector('span:last-child').textContent = pinned ? 'Pinned' : 'Pin';

      showToast(pinned ? 'Pinned to profile' : 'Unpinned from profile');
    }

    function handleFollow(username, btn) {
      const following = state.toggleFollow(username);
      btn.textContent = following ? 'Following' : 'Follow';
      showToast(following ? `Following @${username}` : `Unfollowed @${username}`);
    }

    function submitComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text) return;

      const comment = state.addComment(contentId, text);
      const list = document.getElementById('commentsList');
      list.insertAdjacentHTML('afterbegin', renderComment(comment));

      input.value = '';
      showToast('Comment posted!');

      // Update comment count in actions bar
      const comments = state.getComments(contentId);
      document.querySelector('.comments-section h2').innerHTML = `<i data-lucide="message-circle"></i> Comments (${comments.length})`;
      refreshIcons();
    }

    function shareContent() {
      const content = state.getContentById(contentId);
      if (navigator.share) {
        navigator.share({ title: content.title, url: window.location.href });
      } else {
        navigator.clipboard.writeText(window.location.href);
        showToast('Link copied to clipboard!');
      }
    }

    function renderSimilarContent() {
      const similar = recommendationEngine.getSimilarContent(contentId, 4);
      const grid = document.getElementById('similarGrid');

      if (similar.length === 0) {
        document.getElementById('similarSection').style.display = 'none';
        return;
      }

      grid.innerHTML = similar.map((c, i) => renderContentCard(c, i)).join('');
      setTimeout(initScrollFade, 50);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderContentView();
      renderSimilarContent();
      refreshIcons();
    });
  </script>
</body>
</html>
