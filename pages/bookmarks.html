<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HowToHub — Bookmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="container">
      <a href="../index.html" class="nav-logo">
        <div class="logo-icon">H</div>
        <span>HowToHub</span>
      </a>
      <div class="nav-search">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input type="text" placeholder="Search tutorials, manuals, users..." autocomplete="off">
        <div class="search-results"></div>
      </div>
      <div class="desktop-nav-links">
        <a href="../index.html" class="desktop-nav-link" data-page="home"><i data-lucide="home"></i> Home</a>
        <a href="bookmarks.html" class="desktop-nav-link active" data-page="bookmarks"><i data-lucide="bookmark"></i> Saved</a>
        <a href="profile.html" class="desktop-nav-link" data-page="profile"><i data-lucide="user"></i> Profile</a>
        <a href="settings.html" class="desktop-nav-link" data-page="settings"><i data-lucide="settings"></i> Settings</a>
      </div>
      <div class="nav-actions">
        <button class="nav-btn hide-mobile" onclick="toggleTheme()" title="Toggle theme"><i data-lucide="moon"></i></button>
        <button class="nav-btn hide-mobile" title="Notifications"><i data-lucide="bell"></i><span class="badge"></span></button>
        <a href="profile.html" class="nav-avatar">YU</a>
      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="../index.html" data-page="home"><span class="nav-icon"><i data-lucide="home"></i></span><span>Home</span></a>
    <a href="bookmarks.html" data-page="bookmarks" class="active"><span class="nav-icon"><i data-lucide="bookmark"></i></span><span>Saved</span></a>
    <a href="profile.html" data-page="profile"><span class="nav-icon"><i data-lucide="user"></i></span><span>Profile</span></a>
    <a href="settings.html" data-page="settings"><span class="nav-icon"><i data-lucide="settings"></i></span><span>Settings</span></a>
  </nav>

  <!-- Main Content -->
  <main class="container page-content">
    <div class="feed-header">
      <h1><i data-lucide="bookmark"></i> Saved Content</h1>
    </div>

    <!-- Toolbar -->
    <div class="bookmarks-toolbar">
      <div class="bookmarks-search">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input type="text" id="bookmarkSearch" placeholder="Search saved content..." oninput="filterBookmarks()">
      </div>
      <select class="sort-dropdown" id="bookmarkSort" onchange="filterBookmarks()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="most-liked">Most Liked</option>
        <option value="most-viewed">Most Viewed</option>
      </select>
      <select class="sort-dropdown" id="bookmarkType" onchange="filterBookmarks()">
        <option value="all">All Types</option>
        <option value="Tech">Tech</option>
        <option value="Design">Design</option>
        <option value="DIY">DIY</option>
        <option value="Education">Education</option>
        <option value="Cooking">Cooking</option>
        <option value="Fitness">Fitness</option>
        <option value="Finance">Finance</option>
      </select>
    </div>

    <!-- Bookmarked Content Grid -->
    <div class="cards-grid" id="bookmarksGrid"></div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/algorithm.js"></script>
  <script>
    function filterBookmarks() {
      const query = document.getElementById('bookmarkSearch').value.toLowerCase().trim();
      const sortBy = document.getElementById('bookmarkSort').value;
      const typeFilter = document.getElementById('bookmarkType').value;

      let bookmarked = state.getBookmarkedContent();

      // Search filter
      if (query) {
        bookmarked = bookmarked.filter(c =>
          c.title.toLowerCase().includes(query) ||
          c.preview.toLowerCase().includes(query) ||
          c.author.name.toLowerCase().includes(query) ||
          (c.tags || []).some(t => t.toLowerCase().includes(query))
        );
      }

      // Type filter
      if (typeFilter !== 'all') {
        bookmarked = bookmarked.filter(c => (c.tags || []).includes(typeFilter));
      }

      // Sort
      switch (sortBy) {
        case 'newest':
          bookmarked.sort((a, b) => new Date(b.date) - new Date(a.date));
          break;
        case 'oldest':
          bookmarked.sort((a, b) => new Date(a.date) - new Date(b.date));
          break;
        case 'most-liked':
          bookmarked.sort((a, b) => b.likes - a.likes);
          break;
        case 'most-viewed':
          bookmarked.sort((a, b) => b.views - a.views);
          break;
      }

      renderBookmarks(bookmarked);
    }

    function renderBookmarks(items) {
      const grid = document.getElementById('bookmarksGrid');

      if (items.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-icon"><i data-lucide="bookmark"></i></div>
            <h3>No saved content</h3>
            <p>Save tutorials and manuals to access them quickly later.</p>
            <br>
            <a href="../index.html" class="profile-btn profile-btn-primary">Browse Tutorials</a>
          </div>
        `;
        return;
      }

      grid.innerHTML = items.map((c, i) => renderContentCard(c, i)).join('');
      setTimeout(initScrollFade, 50);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setActiveNav('bookmarks');
      filterBookmarks();
      refreshIcons();
    });
  </script>
</body>
</html>
