<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HowToHub — Discover, Learn, Create</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📘</text></svg>">
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">H</div>
        <span>HowToHub</span>
      </a>

      <div class="nav-search">
        <span class="search-icon"><i data-lucide="search"></i></span>
        <input type="text" placeholder="Search tutorials, manuals, users..." autocomplete="off">
        <div class="search-results"></div>
      </div>

      <div class="desktop-nav-links">
        <a href="index.html" class="desktop-nav-link active" data-page="home"><i data-lucide="home"></i> Home</a>
        <a href="pages/bookmarks.html" class="desktop-nav-link" data-page="bookmarks"><i data-lucide="bookmark"></i> Saved</a>
        <a href="pages/upload.html" class="desktop-nav-link" data-page="create"><i data-lucide="plus-circle"></i> Create</a>
        <a href="pages/profile.html" class="desktop-nav-link" data-page="profile"><i data-lucide="user"></i> Profile</a>
        <a href="pages/settings.html" class="desktop-nav-link" data-page="settings"><i data-lucide="settings"></i> Settings</a>
      </div>

      <div class="nav-actions">
        <button class="nav-btn hide-mobile" onclick="toggleTheme()" title="Toggle theme">
          <i data-lucide="moon"></i>
        </button>
        <button class="nav-btn" onclick="openMobileSearch()" style="display:none" id="mobileSearchBtn">
          <i data-lucide="search"></i>
        </button>
        <button class="nav-btn hide-mobile" title="Notifications">
          <i data-lucide="bell"></i>
          <span class="badge"></span>
        </button>
        <a href="pages/profile.html" class="nav-avatar">YU</a>
      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" data-page="home" class="active">
      <span class="nav-icon"><i data-lucide="home"></i></span>
      <span>Home</span>
    </a>
    <a href="pages/bookmarks.html" data-page="bookmarks">
      <span class="nav-icon"><i data-lucide="bookmark"></i></span>
      <span>Saved</span>
    </a>
    <a href="pages/upload.html" data-page="create">
      <span class="nav-icon"><i data-lucide="plus-circle"></i></span>
      <span>Create</span>
    </a>
    <a href="pages/profile.html" data-page="profile">
      <span class="nav-icon"><i data-lucide="user"></i></span>
      <span>Profile</span>
    </a>
    <a href="pages/settings.html" data-page="settings">
      <span class="nav-icon"><i data-lucide="settings"></i></span>
      <span>Settings</span>
    </a>
  </nav>

  <!-- Mobile Search Overlay -->
  <div class="mobile-search-overlay" id="mobileSearchOverlay">
    <div class="mobile-search-header">
      <input type="text" placeholder="Search tutorials, users..." autocomplete="off">
      <button class="close-search" onclick="closeMobileSearch()">Cancel</button>
    </div>
    <div id="mobileSearchResults"></div>
  </div>

  <!-- Main Content -->
  <main class="container page-content">
    <!-- Feed Header -->
    <div class="feed-header">
      <h1>Discover</h1>
      <div class="feed-tabs">
        <button class="feed-tab active" onclick="filterFeed('all', this)">All</button>
        <button class="feed-tab" onclick="filterFeed('trending', this)">Trending</button>
        <button class="feed-tab" onclick="filterFeed('recommended', this)">For You</button>
        <button class="feed-tab" onclick="filterFeed('latest', this)">Latest</button>
      </div>
    </div>

    <!-- Tag Filters -->
    <div class="feed-filters" style="margin-bottom: 24px;">
      <button class="filter-chip active" onclick="filterByTag('all', this)">All Topics</button>
      <button class="filter-chip" onclick="filterByTag('Tech', this)"><i data-lucide="monitor"></i> Tech</button>
      <button class="filter-chip" onclick="filterByTag('Design', this)"><i data-lucide="palette"></i> Design</button>
      <button class="filter-chip" onclick="filterByTag('DIY', this)"><i data-lucide="hammer"></i> DIY</button>
      <button class="filter-chip" onclick="filterByTag('Education', this)"><i data-lucide="graduation-cap"></i> Education</button>
      <button class="filter-chip" onclick="filterByTag('Cooking', this)"><i data-lucide="chef-hat"></i> Cooking</button>
      <button class="filter-chip" onclick="filterByTag('Fitness', this)"><i data-lucide="dumbbell"></i> Fitness</button>
      <button class="filter-chip" onclick="filterByTag('Finance', this)"><i data-lucide="wallet"></i> Finance</button>
    </div>

    <!-- Cards Grid -->
    <div class="cards-grid" id="feedGrid"></div>

    <!-- Recommended Section -->
    <div class="recommended-section" id="recommendedSection">
      <h2><i data-lucide="sparkles"></i> Recommended for You</h2>
      <div class="recommended-scroll" id="recommendedScroll"></div>
    </div>

    <!-- Suggested Users -->
    <div class="recommended-section" id="suggestedUsers">
      <h2><i data-lucide="users"></i> Suggested Creators</h2>
      <div class="cards-grid" id="suggestedUsersGrid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));"></div>
    </div>
  </main>

  <!-- FAB Create Button -->
  <a href="pages/upload.html" class="fab-create" title="Create new content"><i data-lucide="plus"></i></a>

  <!-- Create Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Create New Tutorial</h2>
        <button class="modal-close" onclick="closeCreateModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="newTitle" placeholder="e.g., How to Build a React App">
        </div>
        <div class="form-group">
          <label>Short Preview</label>
          <textarea id="newPreview" rows="2" placeholder="A brief description of your tutorial (2-3 lines)"></textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="newTags">
            <option value="Tech">Tech</option>
            <option value="Design">Design</option>
            <option value="DIY">DIY</option>
            <option value="Education">Education</option>
            <option value="Cooking">Cooking</option>
            <option value="Fitness">Fitness</option>
            <option value="Finance">Finance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Content (Full Tutorial)</label>
          <textarea id="newBody" rows="8" placeholder="Write your tutorial content here..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="profile-btn profile-btn-secondary" onclick="closeCreateModal()">Cancel</button>
        <button class="profile-btn profile-btn-primary" onclick="submitNewContent()">Publish</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/firebase.js"></script>
  <script src="components/carouselComponent.js"></script>
  <script>
    // --- Page State ---
    let currentFeedType = 'all';
    let currentTag = 'all';

    function getFilteredContent() {
      let content;

      switch (currentFeedType) {
        case 'trending':
          content = recommendationEngine.getTrending(20);
          break;
        case 'recommended':
          content = recommendationEngine.getRecommendations({ limit: 20 });
          break;
        case 'latest':
          content = [...state.getAllContent()].sort((a, b) => new Date(b.date) - new Date(a.date));
          break;
        default:
          content = state.getAllContent();
      }

      if (currentTag !== 'all') {
        content = content.filter(c => (c.tags || []).includes(currentTag));
      }

      return content;
    }

    function renderFeed() {
      const grid = document.getElementById('feedGrid');
      const content = getFilteredContent();

      if (content.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-icon"><i data-lucide="book-open"></i></div>
            <h3>No tutorials found</h3>
            <p>Try a different filter or create the first tutorial in this category!</p>
          </div>
        `;
      } else {
        grid.innerHTML = content.map((c, i) => renderContentCard(c, i)).join('');
      }

      setTimeout(initScrollFade, 50);
    }

    function filterFeed(type, btn) {
      currentFeedType = type;
      document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    }

    function filterByTag(tag, btn) {
      currentTag = tag;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    }

    function renderRecommendations() {
      const scroll = document.getElementById('recommendedScroll');
      const recs = recommendationEngine.getRecommendations({ limit: 6 });
      scroll.innerHTML = recs.map((c, i) => `<div class="recommended-card">${renderContentCard(c, i)}</div>`).join('');
    }

    function renderSuggestedUsers() {
      const grid = document.getElementById('suggestedUsersGrid');
      const users = recommendationEngine.getRecommendedUsers(4);
      grid.innerHTML = users.map(u => `
        <div class="user-card">
          <div class="user-card-avatar">${u.initials}</div>
          <div class="user-card-info">
            <h4>${u.name}</h4>
            <p>@${u.username} · ${formatNumber(u.followers)} followers</p>
          </div>
          <button class="follow-btn" onclick="handleFollow('${u.username}', this)">${state.isFollowing(u.username) ? 'Following' : 'Follow'}</button>
        </div>
      `).join('');
    }

    function handleFollow(username, btn) {
      const following = state.toggleFollow(username);
      btn.textContent = following ? 'Following' : 'Follow';
      showToast(following ? `Following @${username}` : `Unfollowed @${username}`);
    }

    // Show mobile search button on small screens
    function checkMobileSearch() {
      const btn = document.getElementById('mobileSearchBtn');
      if (btn) btn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    }

    window.addEventListener('resize', checkMobileSearch);

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      setActiveNav('home');
      renderFeed();
      renderRecommendations();
      renderSuggestedUsers();
      checkMobileSearch();
      refreshIcons();
    });
  </script>
</body>
</html>
